<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台登录 - keysAndDwd</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            text-align: center;
            padding: 40px 30px 30px;
        }
        .login-header .icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }
        .login-header h2 {
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 6px;
        }
        .login-header p {
            opacity: 0.85;
            font-size: 0.9rem;
        }
        .login-body {
            padding: 36px 32px 40px;
        }
        .form-floating {
            margin-bottom: 20px;
        }
        .form-floating .form-control {
            border-radius: 10px;
            border: 1.5px solid #e0e0e0;
            height: 54px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-floating .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .btn-login {
            width: 100%;
            height: 50px;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-login:hover { opacity: 0.92; }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .alert {
            border-radius: 10px;
            font-size: 0.9rem;
        }
        .shake {
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
    </style>
</head>
<body>
    <div class="login-card" id="loginCard">
        <div class="login-header">
            <div class="icon"><i class="bi bi-shield-lock-fill"></i></div>
            <h2>keysAndDwd 管理后台</h2>
            <p>请输入管理员凭证以继续</p>
        </div>
        <div class="login-body">
            <div id="errorMsg" class="alert alert-danger d-none" role="alert"></div>
            <form id="loginForm" autocomplete="off">
                <div class="form-floating">
                    <input type="text" class="form-control" id="username" placeholder="账号" autofocus required>
                    <label for="username"><i class="bi bi-person"></i> 账号</label>
                </div>
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" placeholder="密码" required>
                    <label for="password"><i class="bi bi-lock"></i> 密码</label>
                </div>
                <button type="submit" class="btn btn-login" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right"></i> 登 录
                </button>
            </form>
        </div>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const errEl = document.getElementById('errorMsg');
        const card = document.getElementById('loginCard');

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>验证中...';
        errEl.classList.add('d-none');

        try {
            const resp = await fetch('/api/auth/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });

            const data = await resp.json();

            if (data.ok) {
                btn.innerHTML = '<i class="bi bi-check-lg"></i> 登录成功';
                btn.style.background = '#198754';
                setTimeout(() => { window.location.href = '/admin.html'; }, 500);
            } else {
                errEl.textContent = data.error || '登录失败';
                errEl.classList.remove('d-none');
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 500);
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> 登 录';
            }
        } catch (err) {
            errEl.textContent = '网络错误，请重试';
            errEl.classList.remove('d-none');
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> 登 录';
        }
    });
    </script>
</body>
</html>
