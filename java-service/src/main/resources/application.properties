server.port=3003

# 数据库：指向上层目录的 SQLite（与 Node 版共享）
spring.datasource.url=jdbc:sqlite:file:../database.sqlite
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.max-lifetime=1800000

# 路径（可被环境变量覆盖）
app.cache-root=
app.releases-root=
app.import-allowlist=github.com,raw.githubusercontent.com,gitlab.com
app.cors.allowed-origins=*
app.setup.token=
app.security.require-api-key=false

# S3 配置（可选，留空则仅本地存储）
app.s3.enabled=false
app.s3.bucket=
app.s3.region=
app.s3.prefix=artifacts/
app.s3.access-key-id=
app.s3.secret-access-key=

# 改为never，避免每次启动都执行schema.sql（数据库已初始化后应使用never）
# 首次启动时使用always，之后改为never
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema.sql

# 解决上传413（文件过大）
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB
spring.servlet.multipart.file-size-threshold=2MB
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1

# 许可证签名密钥（启动时会自动生成并输出到控制台）
app.license.private-key=p013jHds0FRpChdrR2cFG+Xmhz+K+xgkY29YUe9zCpA=
app.license.public-key=asrPC2xVCMqZlBCuzEcypgKnxDBph3/ieVGotyCCtiA=

# 许可证系统配置
app.license.default-expire-days=30

# 服务器IP绑定配置
app.security.server-switch-cooldown-minutes=30
app.security.enable-server-ip-binding=false

